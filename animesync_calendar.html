<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AnimeSync — カレンダー</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #060810;
  --bg2:     #0a0e18;
  --bg3:     #0f1520;
  --bg4:     #141c28;
  --border:  rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --accent:  #4db8d4;
  --accent2: #e8608a;
  --accent3: #6ec47a;
  --gold:    #f0c040;
  --purple:  #9b7fe8;
  --text:    #e0e8f4;
  --muted:   #445566;
  --muted2:  #7a8fa8;
  --card:    rgba(255,255,255,0.04);
  --nav-h:   60px;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { scroll-behavior:smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  min-height: 100vh;
  padding-bottom: calc(var(--nav-h) + 16px);
  overflow-x: hidden;
}
body::before {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.022'/%3E%3C/svg%3E");
}

/* ===== TOP NAV ===== */
.topnav {
  position:sticky; top:0; z-index:100;
  height:52px;
  background:rgba(6,8,16,0.92);
  backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 16px;
}
.nav-logo {
  font-family:'Bebas Neue',sans-serif;
  font-size:22px; letter-spacing:4px;
  color:var(--accent);
  text-shadow:0 0 20px rgba(77,184,212,0.45);
}
.nav-back {
  display:flex; align-items:center; gap:6px;
  font-size:13px; color:var(--muted2); cursor:pointer;
  padding:6px 10px; border-radius:8px;
  background:var(--card); border:1px solid var(--border);
}

/* ===== MONTH NAV ===== */
.month-nav {
  position:sticky; top:52px; z-index:90;
  background:rgba(6,8,16,0.95);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:12px 16px;
  display:flex; align-items:center; justify-content:space-between;
}
.month-title {
  font-family:'Bebas Neue',sans-serif;
  font-size:22px; letter-spacing:3px; color:var(--text);
}
.month-title span { color:var(--accent); }
.month-btn {
  width:34px; height:34px; border-radius:8px;
  background:var(--card); border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  font-size:16px; cursor:pointer; color:var(--muted2);
  transition:all 0.15s;
}
.month-btn:hover { border-color:var(--border2); color:var(--text); }

/* ===== 曜日ヘッダー ===== */
.weekday-header {
  display:grid; grid-template-columns:repeat(7,1fr);
  padding:0 8px;
  border-bottom:1px solid var(--border);
  background:var(--bg2);
}
.wd-cell {
  text-align:center; padding:8px 2px;
  font-size:10px; letter-spacing:1px; color:var(--muted2);
}
.wd-cell.sun { color:#e87060; }
.wd-cell.sat { color:var(--accent); }

/* ===== カレンダーグリッド ===== */
.cal-grid {
  display:grid; grid-template-columns:repeat(7,1fr);
  padding:4px 8px 16px;
  gap:2px;
  position:relative; z-index:1;
}

.day-cell {
  min-height:80px;
  padding:4px 3px;
  border-radius:8px;
  position:relative;
  transition:background 0.15s;
}
.day-cell:hover { background:rgba(255,255,255,0.03); }
.day-cell.other-month { opacity:0.3; }
.day-cell.today .day-num {
  background:var(--accent);
  color:#060810;
  border-radius:50%;
  width:22px; height:22px;
  display:flex; align-items:center; justify-content:center;
  font-weight:700;
}

.day-num {
  font-size:11px; color:var(--muted2);
  margin-bottom:4px;
  width:22px; height:22px;
  display:flex; align-items:center; justify-content:center;
}
.day-cell.sun .day-num { color:#e87060; }
.day-cell.sat .day-num { color:var(--accent); }

/* アニメチップ */
.anime-chip {
  border-radius:4px;
  padding:2px 4px;
  margin-bottom:2px;
  font-size:9px;
  line-height:1.3;
  cursor:pointer;
  transition:opacity 0.12s;
  display:flex; align-items:center; gap:3px;
  overflow:hidden;
}
.anime-chip:hover { opacity:0.8; }
.anime-chip.abema  { background:rgba(232,96,138,0.2); border-left:2px solid var(--accent2); color:rgba(232,234,240,0.9); }
.anime-chip.prime  { background:rgba(110,196,122,0.2); border-left:2px solid var(--accent3); color:rgba(232,234,240,0.9); }
.anime-chip.unext  { background:rgba(240,192,64,0.2);  border-left:2px solid var(--gold);    color:rgba(232,234,240,0.9); }
.anime-chip.tv     { background:rgba(255,255,255,0.08); border-left:2px solid var(--muted2); color:rgba(232,234,240,0.7); }

.chip-emoji { font-size:10px; flex-shrink:0; }
.chip-title { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; }

/* more badge */
.more-badge {
  font-size:9px; color:var(--muted2);
  padding:1px 4px;
  background:rgba(255,255,255,0.06);
  border-radius:3px;
  cursor:pointer;
}

/* ===== 凡例 ===== */
.legend {
  display:flex; gap:12px; flex-wrap:wrap;
  padding:12px 16px;
  border-top:1px solid var(--border);
  border-bottom:1px solid var(--border);
  background:var(--bg2);
}
.legend-item {
  display:flex; align-items:center; gap:5px;
  font-size:10px; color:var(--muted2);
}
.legend-dot {
  width:8px; height:8px; border-radius:2px;
}

/* ===== モーダル ===== */
.modal-overlay {
  position:fixed; inset:0; z-index:200;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(8px);
  display:flex; align-items:flex-end;
  opacity:0; pointer-events:none;
  transition:opacity 0.25s;
}
.modal-overlay.show { opacity:1; pointer-events:all; }
.modal {
  width:100%;
  background:var(--bg3);
  border-radius:20px 20px 0 0;
  border-top:1px solid var(--border2);
  padding:20px 20px 40px;
  transform:translateY(100%);
  transition:transform 0.3s cubic-bezier(.34,1.2,.64,1);
  max-height:70vh;
  overflow-y:auto;
}
.modal-overlay.show .modal { transform:translateY(0); }
.modal-handle {
  width:36px; height:4px; border-radius:2px;
  background:var(--muted); margin:0 auto 16px;
}
.modal-date {
  font-size:12px; color:var(--muted2); letter-spacing:2px; margin-bottom:14px;
}
.modal-anime-list { display:flex; flex-direction:column; gap:10px; }
.modal-anime-item {
  background:var(--bg4); border:1px solid var(--border);
  border-radius:12px; padding:12px 14px;
  display:flex; align-items:center; gap:12px;
}
.mai-emoji { font-size:22px; flex-shrink:0; }
.mai-info { flex:1; }
.mai-title { font-weight:700; font-size:14px; margin-bottom:3px; }
.mai-meta { font-size:11px; color:var(--muted2); display:flex; gap:8px; flex-wrap:wrap; }
.mai-badge {
  font-size:10px; padding:1px 7px; border-radius:10px; font-weight:700;
}
.mai-badge.abema { background:rgba(232,96,138,0.2); color:var(--accent2); }
.mai-badge.prime { background:rgba(110,196,122,0.2); color:var(--accent3); }
.mai-badge.unext { background:rgba(240,192,64,0.2);  color:var(--gold); }
.mai-badge.tv    { background:rgba(255,255,255,0.08); color:var(--muted2); }

/* ===== BOTTOM NAV ===== */
.bottomnav {
  position:fixed; bottom:0; left:0; right:0; z-index:100;
  height:var(--nav-h);
  background:rgba(6,8,16,0.96);
  backdrop-filter:blur(24px);
  border-top:1px solid var(--border);
  display:flex; align-items:center;
}
.bn-item {
  flex:1; display:flex; flex-direction:column; align-items:center;
  gap:3px; cursor:pointer; padding:8px 0;
  font-size:10px; color:var(--muted2); letter-spacing:0.5px;
  transition:color 0.15s;
}
.bn-item.active { color:var(--accent); }
.bn-icon { font-size:20px; }
</style>
</head>
<body>

<!-- TOP NAV -->
<nav class="topnav">
  <div class="nav-logo" onclick="location.href='index.html'" style="cursor:pointer">AnimeSync</div>
  <div class="nav-back" onclick="location.href='index.html'">← ホーム</div>
</nav>

<!-- MONTH NAV -->
<div class="month-nav">
  <div class="month-btn" onclick="changeMonth(-1)">‹</div>
  <div class="month-title" id="month-title"></div>
  <div class="month-btn" onclick="changeMonth(1)">›</div>
</div>

<!-- 凡例 -->
<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:var(--accent2)"></div>ABEMA</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--accent3)"></div>Prime Video</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--gold)"></div>Netflix / U-NEXT</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--muted2)"></div>地上波</div>
</div>

<!-- 曜日ヘッダー -->
<div class="weekday-header">
  <div class="wd-cell sun">日</div>
  <div class="wd-cell">月</div>
  <div class="wd-cell">火</div>
  <div class="wd-cell">水</div>
  <div class="wd-cell">木</div>
  <div class="wd-cell">金</div>
  <div class="wd-cell sat">土</div>
</div>

<!-- カレンダーグリッド -->
<div class="cal-grid" id="cal-grid"></div>

<!-- モーダル -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-date" id="modal-date"></div>
    <div class="modal-anime-list" id="modal-list"></div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottomnav">
  <div class="bn-item" onclick="location.href='index.html'">
    <span class="bn-icon">🏠</span><span>ホーム</span>
  </div>
  <div class="bn-item active">
    <span class="bn-icon">📅</span><span>スケジュール</span>
  </div>
  <div class="bn-item" onclick="location.href='animesync_ranking.html'">
    <span class="bn-icon">🏆</span><span>ランキング</span>
  </div>
  <div class="bn-item">
    <span class="bn-icon">💬</span><span>コミュニティ</span>
  </div>
  <div class="bn-item" onclick="location.href='animesync_pc.html'">
    <span class="bn-icon">👤</span><span>マイページ</span>
  </div>
</nav>

<script>
// ============================================================
// アニメデータ（dayOfWeek: 0=日〜6=土）
// ============================================================
const ANIMES = [
  { id:'tongari',      title:'とんがり帽子のアトリエ',            emoji:'🧙', dayOfWeek:1, time:'23:00', platform:'Netflix',      pk:'unext', note:'先行' },
  { id:'replica',      title:'レプリカだって恋をする',             emoji:'💘', dayOfWeek:2, time:'24:00', platform:'ABEMA',        pk:'abema', note:'先行' },
  { id:'marriage',     title:'マリッジトキシン',                   emoji:'💍', dayOfWeek:2, time:'23:00', platform:'Netflix',      pk:'unext', note:'' },
  { id:'aisiteru',     title:'愛してるゲームを終わらせたい',       emoji:'🎮', dayOfWeek:2, time:'23:30', platform:'ABEMA',        pk:'abema', note:'先行' },
  { id:'hidari',       title:'左ききのエレン',                     emoji:'🎨', dayOfWeek:2, time:'24:30', platform:'Prime Video',  pk:'prime', note:'先行' },
  { id:'otaku',        title:'クラスで2番目に可愛い女の子と友だちになった', emoji:'🎀', dayOfWeek:2, time:'24:00', platform:'U-NEXT', pk:'unext', note:'' },
  { id:'awashima',     title:'淡島百景',                           emoji:'🌸', dayOfWeek:2, time:'26:15', platform:'ABEMA',        pk:'abema', note:'' },
  { id:'ichitatami',   title:'一畳間まんきつ暮らし！',              emoji:'🍜', dayOfWeek:2, time:'26:00', platform:'ABEMA',        pk:'abema', note:'' },
  { id:'koori',        title:'氷の城壁',                           emoji:'🧊', dayOfWeek:4, time:'24:30', platform:'Netflix',      pk:'unext', note:'先行' },
  { id:'kiriwo',       title:'霧尾ファンクラブ',                   emoji:'🌫️', dayOfWeek:4, time:'25:00', platform:'ABEMA',       pk:'abema', note:'' },
  { id:'kamiike',      title:'上伊那ぼたん、酔える姿は百合の花',   emoji:'🌺', dayOfWeek:5, time:'24:00', platform:'ABEMA',        pk:'abema', note:'先行' },
  { id:'otaku2',       title:'オタクに優しいギャルはいない',        emoji:'💅', dayOfWeek:6, time:'12:00', platform:'ABEMA',        pk:'abema', note:'' },
  { id:'haruyuki',     title:'春夏秋冬代行者',                     emoji:'🍂', dayOfWeek:6, time:'24:00', platform:'Netflix',      pk:'unext', note:'' },
  { id:'kaminiwa',     title:'神の庭付き楠木邸',                   emoji:'🌳', dayOfWeek:6, time:'26:00', platform:'ABEMA',        pk:'abema', note:'先行' },
  { id:'akane',        title:'あかね噺',                           emoji:'🎭', dayOfWeek:0, time:'24:00', platform:'Netflix',      pk:'unext', note:'先行' },
  { id:'nihonsangoku', title:'日本三國',                           emoji:'⚔️', dayOfWeek:0, time:'21:00', platform:'Prime Video',  pk:'prime', note:'先行' },
];

const MONTHS = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
const DAYS_JP = ['日','月','火','水','木','金','土'];

let currentYear = new Date().getFullYear();
let currentMonth = new Date().getMonth();

// ============================================================
// カレンダー描画
// ============================================================
function renderCalendar() {
  const today = new Date();
  const firstDay = new Date(currentYear, currentMonth, 1);
  const lastDay  = new Date(currentYear, currentMonth + 1, 0);
  const startDow = firstDay.getDay(); // 0=日
  const totalDays = lastDay.getDate();

  document.getElementById('month-title').innerHTML =
    `<span>${currentYear}</span> ${MONTHS[currentMonth]}`;

  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';

  // 前月の空白
  for (let i = 0; i < startDow; i++) {
    const prevDate = new Date(currentYear, currentMonth, -startDow + i + 1);
    grid.appendChild(createDayCell(prevDate, true));
  }

  // 当月
  for (let d = 1; d <= totalDays; d++) {
    const date = new Date(currentYear, currentMonth, d);
    const isToday = date.toDateString() === today.toDateString();
    grid.appendChild(createDayCell(date, false, isToday));
  }

  // 翌月の空白（6行になるよう調整）
  const total = startDow + totalDays;
  const remaining = total % 7 === 0 ? 0 : 7 - (total % 7);
  for (let i = 1; i <= remaining; i++) {
    const nextDate = new Date(currentYear, currentMonth + 1, i);
    grid.appendChild(createDayCell(nextDate, true));
  }
}

function createDayCell(date, isOther, isToday) {
  const cell = document.createElement('div');
  cell.className = 'day-cell' +
    (isOther ? ' other-month' : '') +
    (isToday ? ' today' : '') +
    (date.getDay() === 0 ? ' sun' : '') +
    (date.getDay() === 6 ? ' sat' : '');

  const numEl = document.createElement('div');
  numEl.className = 'day-num';
  numEl.textContent = date.getDate();
  cell.appendChild(numEl);

  // その曜日のアニメを取得
  const dow = date.getDay();
  const animes = ANIMES.filter(a => a.dayOfWeek === dow);

  const MAX_SHOW = 2;
  animes.slice(0, MAX_SHOW).forEach(a => {
    const chip = document.createElement('div');
    chip.className = `anime-chip ${a.pk}`;
    chip.innerHTML = `<span class="chip-emoji">${a.emoji}</span><span class="chip-title">${a.title}</span>`;
    chip.onclick = () => openModal(date, animes);
    cell.appendChild(chip);
  });

  if (animes.length > MAX_SHOW) {
    const more = document.createElement('div');
    more.className = 'more-badge';
    more.textContent = `+${animes.length - MAX_SHOW}`;
    more.onclick = () => openModal(date, animes);
    cell.appendChild(more);
  }

  if (animes.length > 0 && animes.length <= MAX_SHOW) {
    cell.onclick = () => openModal(date, animes);
  }

  return cell;
}

// ============================================================
// 月移動
// ============================================================
function changeMonth(dir) {
  currentMonth += dir;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  if (currentMonth < 0)  { currentMonth = 11; currentYear--; }
  renderCalendar();
}

// ============================================================
// モーダル
// ============================================================
function openModal(date, animes) {
  const overlay = document.getElementById('modal-overlay');
  const dateEl  = document.getElementById('modal-date');
  const listEl  = document.getElementById('modal-list');

  dateEl.textContent = `${date.getMonth()+1}月${date.getDate()}日（${DAYS_JP[date.getDay()]}）`;

  listEl.innerHTML = animes.map(a => `
    <div class="modal-anime-item">
      <span class="mai-emoji">${a.emoji}</span>
      <div class="mai-info">
        <div class="mai-title">${a.title}</div>
        <div class="mai-meta">
          <span>🕐 ${a.time}</span>
          <span class="mai-badge ${a.pk}">${a.platform}</span>
          ${a.note ? `<span style="color:var(--muted2)">${a.note}</span>` : ''}
        </div>
      </div>
    </div>
  `).join('');

  overlay.classList.add('show');
}

function closeModal(e) {
  if (e.target === document.getElementById('modal-overlay')) {
    document.getElementById('modal-overlay').classList.remove('show');
  }
}

// ============================================================
// 初期化
// ============================================================
renderCalendar();
</script>
</body>
</html>
