<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AnimeSync — ランキング</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #060810;
  --bg2:     #0a0e18;
  --bg3:     #0f1520;
  --bg4:     #141c28;
  --border:  rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --accent:  #4db8d4;
  --accent2: #e8608a;
  --accent3: #6ec47a;
  --gold:    #f0c040;
  --gold2:   #ffd700;
  --silver:  #a0b4c8;
  --bronze:  #c8906a;
  --purple:  #9b7fe8;
  --text:    #e0e8f4;
  --muted:   #445566;
  --muted2:  #7a8fa8;
  --card:    rgba(255,255,255,0.04);
  --nav-h:   60px;

  --kami-color:  #f0c040;
  --yoin-color:  #4db8d4;
  --fubin-color: #e8608a;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  min-height: 100vh;
  padding-bottom: calc(var(--nav-h) + 24px);
  overflow-x: hidden;
}
body::before {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.022'/%3E%3C/svg%3E");
}

/* ===== TOP NAV ===== */
.topnav {
  position:sticky; top:0; z-index:100;
  height:52px;
  background:rgba(6,8,16,0.92);
  backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 16px;
}
.nav-logo {
  font-family:'Bebas Neue',sans-serif;
  font-size:22px; letter-spacing:4px;
  color:var(--accent);
  text-shadow:0 0 20px rgba(77,184,212,0.45);
}
.nav-back {
  display:flex; align-items:center; gap:6px;
  font-size:13px; color:var(--muted2); cursor:pointer;
  padding:6px 10px; border-radius:8px;
  background:var(--card); border:1px solid var(--border);
}

/* ===== メインコンテンツ ===== */
main { position:relative; z-index:1; padding:20px 16px; }

/* ===== ヘッダー ===== */
.page-header { margin-bottom:20px; }
.page-title {
  font-family:'Bebas Neue',sans-serif;
  font-size:28px; letter-spacing:4px; color:var(--text);
  margin-bottom:4px;
}
.page-sub { font-size:12px; color:var(--muted2); }

/* ===== 期間切り替え ===== */
.period-switch {
  display:flex; gap:6px; margin-bottom:20px;
}
.period-btn {
  flex:1; padding:10px; border-radius:10px; cursor:pointer;
  border:1px solid var(--border); background:none;
  font-family:'Noto Sans JP',sans-serif; font-size:13px; font-weight:700;
  color:var(--muted2); transition:all 0.15s; text-align:center;
}
.period-btn.active {
  background:rgba(77,184,212,0.12);
  border-color:rgba(77,184,212,0.4);
  color:var(--accent);
}

/* ===== スコア凡例 ===== */
.score-legend {
  display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap;
}
.sl-item {
  display:flex; align-items:center; gap:5px;
  background:var(--bg2); border:1px solid var(--border);
  border-radius:8px; padding:6px 10px;
  font-size:11px; color:var(--muted2);
}
.sl-score { font-family:'Bebas Neue',sans-serif; font-size:16px; }
.sl-score.kami  { color:var(--kami-color); }
.sl-score.yoin  { color:var(--yoin-color); }
.sl-score.fubin { color:var(--fubin-color); }

/* ===== 感情ログ入力エリア ===== */
.log-area {
  background:var(--bg2); border:1px solid var(--border);
  border-radius:14px; padding:16px; margin-bottom:24px;
}
.log-area-title {
  font-size:11px; letter-spacing:2px; color:var(--muted2);
  margin-bottom:12px; text-transform:uppercase;
}
.log-anime-select {
  width:100%; background:var(--bg3); border:1px solid var(--border);
  border-radius:8px; color:var(--text); padding:9px 12px;
  font-family:'Noto Sans JP',sans-serif; font-size:13px;
  margin-bottom:10px; transition:border-color 0.15s;
}
.log-anime-select:focus { outline:none; border-color:rgba(77,184,212,0.4); }
.emotion-btns {
  display:flex; gap:8px;
}
.emotion-log-btn {
  flex:1; padding:11px 4px; border-radius:10px; cursor:pointer;
  border:1px solid var(--border); background:rgba(255,255,255,0.03);
  font-family:'Noto Sans JP',sans-serif; font-size:13px; font-weight:700;
  color:var(--muted2); transition:all 0.15s; text-align:center;
  position:relative; overflow:hidden;
}
.emotion-log-btn:active { transform:scale(0.96); }
.emotion-log-btn.kami  { background:rgba(240,192,64,0.15); border-color:rgba(240,192,64,0.4); color:var(--kami-color); }
.emotion-log-btn.yoin  { background:rgba(77,184,212,0.15); border-color:rgba(77,184,212,0.4); color:var(--yoin-color); }
.emotion-log-btn.fubin { background:rgba(232,96,138,0.15); border-color:rgba(232,96,138,0.4); color:var(--fubin-color); }
.btn-score {
  font-size:10px; display:block; opacity:0.7; margin-top:2px;
  font-family:'Bebas Neue',sans-serif; letter-spacing:1px;
}

/* ===== TOP3 表彰台 ===== */
.podium {
  display:flex; align-items:flex-end; justify-content:center;
  gap:8px; margin-bottom:24px; padding:0 4px;
}
.podium-item {
  flex:1; display:flex; flex-direction:column; align-items:center;
  animation: podiumIn 0.5s ease both;
}
.podium-item:nth-child(1) { animation-delay:0.1s; order:2; }
.podium-item:nth-child(2) { animation-delay:0.2s; order:1; }
.podium-item:nth-child(3) { animation-delay:0.3s; order:3; }
@keyframes podiumIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

.podium-emoji { font-size:28px; margin-bottom:6px; }
.podium-title {
  font-size:11px; font-weight:700; text-align:center;
  line-height:1.3; margin-bottom:6px;
  max-width:90px; overflow:hidden;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
}
.podium-score {
  font-family:'Bebas Neue',sans-serif; font-size:20px;
  margin-bottom:6px;
}
.podium-bar {
  width:100%; border-radius:8px 8px 0 0;
  display:flex; align-items:center; justify-content:center;
  padding:8px 4px;
}
.podium-rank {
  font-family:'Bebas Neue',sans-serif; font-size:24px;
  text-shadow:0 2px 8px rgba(0,0,0,0.4);
}

/* 1位 */
.podium-item:nth-child(1) .podium-bar {
  height:80px; background:linear-gradient(180deg,rgba(255,215,0,0.25),rgba(255,215,0,0.1));
  border:1px solid rgba(255,215,0,0.3);
}
.podium-item:nth-child(1) .podium-score { color:var(--gold2); text-shadow:0 0 16px rgba(255,215,0,0.5); }
.podium-item:nth-child(1) .podium-rank  { color:var(--gold2); }

/* 2位 */
.podium-item:nth-child(2) .podium-bar {
  height:60px; background:linear-gradient(180deg,rgba(160,180,200,0.2),rgba(160,180,200,0.08));
  border:1px solid rgba(160,180,200,0.25);
}
.podium-item:nth-child(2) .podium-score { color:var(--silver); }
.podium-item:nth-child(2) .podium-rank  { color:var(--silver); }

/* 3位 */
.podium-item:nth-child(3) .podium-bar {
  height:44px; background:linear-gradient(180deg,rgba(200,144,106,0.2),rgba(200,144,106,0.08));
  border:1px solid rgba(200,144,106,0.25);
}
.podium-item:nth-child(3) .podium-score { color:var(--bronze); }
.podium-item:nth-child(3) .podium-rank  { color:var(--bronze); }

/* ===== 4位以下リスト ===== */
.rank-list { display:flex; flex-direction:column; gap:8px; margin-bottom:24px; }
.rank-item {
  background:var(--bg2); border:1px solid var(--border);
  border-radius:12px; padding:12px 14px;
  display:flex; align-items:center; gap:12px;
  animation: rankIn 0.4s ease both;
  position:relative; overflow:hidden;
}
@keyframes rankIn { from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:translateX(0)} }

.rank-num {
  font-family:'Bebas Neue',sans-serif; font-size:22px;
  color:var(--muted2); width:28px; text-align:center; flex-shrink:0;
}
.rank-emoji { font-size:22px; flex-shrink:0; }
.rank-info { flex:1; }
.rank-title { font-weight:700; font-size:14px; margin-bottom:4px; }
.rank-breakdown {
  display:flex; gap:8px; font-size:10px;
}
.rb-item { display:flex; align-items:center; gap:3px; }
.rb-count { font-family:'Bebas Neue',sans-serif; font-size:13px; }
.rb-count.kami  { color:var(--kami-color); }
.rb-count.yoin  { color:var(--yoin-color); }
.rb-count.fubin { color:var(--fubin-color); }

.rank-score-wrap { text-align:right; flex-shrink:0; }
.rank-score {
  font-family:'Bebas Neue',sans-serif; font-size:26px; color:var(--accent);
  line-height:1;
}
.rank-score-label { font-size:10px; color:var(--muted2); }

/* スコアバー */
.score-bar-wrap { margin-top:6px; }
.score-bar {
  height:3px; border-radius:2px; background:var(--bg3);
  overflow:hidden;
}
.score-bar-fill {
  height:100%; border-radius:2px;
  background:linear-gradient(90deg, var(--accent), var(--purple));
  transition:width 0.6s cubic-bezier(.34,1.2,.64,1);
}


/* ===== Xシェアボタン ===== */
.x-share-btn {
  width:100%; padding:13px; border-radius:12px; cursor:pointer;
  background: rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.15);
  color:var(--text); font-family:'Noto Sans JP',sans-serif;
  font-size:14px; font-weight:700; letter-spacing:1px;
  display:flex; align-items:center; justify-content:center; gap:8px;
  transition:all 0.15s; margin-bottom:20px;
  text-decoration:none;
}
.x-share-btn:hover { background:rgba(255,255,255,0.1); border-color:rgba(255,255,255,0.25); }
.x-share-btn:active { transform:scale(0.98); }
.x-logo { font-size:18px; font-weight:900; }

/* ===== ゼロ状態 ===== */
.empty-state {
  text-align:center; padding:48px 20px; color:var(--muted2);
}
.empty-state .icon { font-size:36px; margin-bottom:12px; }
.empty-state p { font-size:13px; line-height:1.8; }

/* ===== 週情報 ===== */
.week-label {
  font-size:11px; color:var(--muted2); letter-spacing:2px;
  margin-bottom:16px; text-align:center;
}

/* ===== トースト ===== */
.toast {
  position:fixed; bottom:calc(var(--nav-h)+16px); left:50%;
  transform:translateX(-50%) translateY(20px);
  background:var(--bg3); border:1px solid var(--border2);
  border-radius:24px; padding:10px 20px;
  font-size:13px; z-index:200; opacity:0;
  transition:all 0.25s cubic-bezier(.34,1.56,.64,1);
  white-space:nowrap; pointer-events:none;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* ===== BOTTOM NAV ===== */
.bottomnav {
  position:fixed; bottom:0; left:0; right:0; z-index:100;
  height:var(--nav-h);
  background:rgba(6,8,16,0.96);
  backdrop-filter:blur(24px);
  border-top:1px solid var(--border);
  display:flex; align-items:center;
}
.bn-item {
  flex:1; display:flex; flex-direction:column; align-items:center;
  gap:3px; cursor:pointer; padding:8px 0;
  font-size:10px; color:var(--muted2);
  transition:color 0.15s;
}
.bn-item.active { color:var(--accent); }
.bn-icon { font-size:20px; }
</style>
</head>
<body>

<!-- TOP NAV -->
<nav class="topnav">
  <div class="nav-logo">AnimeSync</div>
  <div class="nav-back" onclick="location.href='index.html'">← ホーム</div>
</nav>

<main>

  <!-- ヘッダー -->
  <div class="page-header">
    <div class="page-title">🏆 感情ランキング</div>
    <div class="page-sub">神・余韻・不憫の感情スコアで競う、リアタイ体験の記録</div>
  </div>

  <!-- 期間切り替え -->
  <div class="period-switch">
    <button class="period-btn active" id="btn-weekly" onclick="switchPeriod('weekly')">📅 今週</button>
    <button class="period-btn" id="btn-season" onclick="switchPeriod('season')">🌸 シーズン累計</button>
  </div>

  <!-- スコア凡例 -->
  <div class="score-legend">
    <div class="sl-item"><span class="sl-score kami">+5</span>✨ 神</div>
    <div class="sl-item"><span class="sl-score yoin">+3</span>🌊 余韻</div>

  </div>

  <!-- 感情ログ入力 -->
  <div class="log-area">
    <div class="log-area-title">今週の感情を記録する</div>
    <select class="log-anime-select" id="anime-select">
      <option value="">作品を選ぶ</option>
    </select>
    <div class="emotion-btns">
      <button class="emotion-log-btn kami" onclick="logEmotion('kami')">
        ✨ 神<span class="btn-score">+5点</span>
      </button>
      <button class="emotion-log-btn yoin" onclick="logEmotion('yoin')">
        🌊 余韻<span class="btn-score">+3点</span>
      </button>
      <button class="emotion-log-btn fubin" onclick="logEmotion('fubin')">
        💔 不憫<span class="btn-score">+1点</span>
      </button>
    </div>
  </div>

  <!-- 週ラベル -->
  <div class="week-label" id="week-label"></div>


  <!-- Xシェアボタン -->
  <a class="x-share-btn" id="x-share-btn" href="#" target="_blank" rel="noopener" style="display:none">
    <span class="x-logo">𝕏</span> 今週のTOP3をポストする
  </a>

  <!-- TOP3 表彰台 -->
  <div class="podium" id="podium"></div>

  <!-- 4位以下 -->
  <div class="rank-list" id="rank-list"></div>

</main>

<!-- BOTTOM NAV -->
<nav class="bottomnav">
  <div class="bn-item" onclick="location.href='index.html'">
    <span class="bn-icon">🏠</span><span>ホーム</span>
  </div>
  <div class="bn-item" onclick="location.href='animesync_calendar.html'">
    <span class="bn-icon">📅</span><span>スケジュール</span>
  </div>
  <div class="bn-item active">
    <span class="bn-icon">🏆</span><span>ランキング</span>
  </div>
  <div class="bn-item">
    <span class="bn-icon">💬</span><span>コミュニティ</span>
  </div>
  <div class="bn-item" onclick="location.href='animesync_pc.html'">
    <span class="bn-icon">👤</span><span>マイページ</span>
  </div>
</nav>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// アニメデータ
// ============================================================
const ANIMES = [
  { id:'tongari',      title:'とんがり帽子のアトリエ',                    emoji:'🧙' },
  { id:'replica',      title:'レプリカだって恋をする',                    emoji:'💘' },
  { id:'marriage',     title:'マリッジトキシン',                          emoji:'💍' },
  { id:'aisiteru',     title:'愛してるゲームを終わらせたい',              emoji:'🎮' },
  { id:'hidari',       title:'左ききのエレン',                            emoji:'🎨' },
  { id:'otaku',        title:'クラスで2番目に可愛い女の子と友だちになった', emoji:'🎀' },
  { id:'awashima',     title:'淡島百景',                                  emoji:'🌸' },
  { id:'ichitatami',   title:'一畳間まんきつ暮らし！',                     emoji:'🍜' },
  { id:'koori',        title:'氷の城壁',                                  emoji:'🧊' },
  { id:'kiriwo',       title:'霧尾ファンクラブ',                          emoji:'🌫️' },
  { id:'kamiike',      title:'上伊那ぼたん、酔える姿は百合の花',          emoji:'🌺' },
  { id:'otaku2',       title:'オタクに優しいギャルはいない',              emoji:'💅' },
  { id:'haruyuki',     title:'春夏秋冬代行者',                            emoji:'🍂' },
  { id:'kaminiwa',     title:'神の庭付き楠木邸',                          emoji:'🌳' },
  { id:'akane',        title:'あかね噺',                                  emoji:'🎭' },
  { id:'nihonsangoku', title:'日本三國',                                  emoji:'⚔️' },
];

const SCORES = { kami:5, yoin:3, fubin:1 };
const EMOTION_LABEL = { kami:'✨ 神', yoin:'🌊 余韻', fubin:'💔 不憫' };

// ローカルストレージキー
function getWeekKey() {
  const now = new Date();
  const d = new Date(now);
  d.setDate(d.getDate() - d.getDay() + 1);
  return `as_rank_week_${d.getFullYear()}_${String(d.getMonth()+1).padStart(2,'0')}_${String(d.getDate()).padStart(2,'0')}`;
}
const SEASON_KEY = 'as_rank_season_2026spring';

function loadData(key) { try { return JSON.parse(localStorage.getItem(key)||'{}'); } catch(e) { return {}; } }
function saveData(key,val) { localStorage.setItem(key,JSON.stringify(val)); }

let currentPeriod = 'weekly';

// ============================================================
// セレクト初期化
// ============================================================
function initSelect() {
  const sel = document.getElementById('anime-select');
  ANIMES.forEach(a => {
    const opt = document.createElement('option');
    opt.value = a.id;
    opt.textContent = `${a.emoji} ${a.title}`;
    sel.appendChild(opt);
  });
}

// ============================================================
// 感情ログ記録
// ============================================================
function logEmotion(type) {
  const animeId = document.getElementById('anime-select').value;
  if (!animeId) { showToast('作品を選んでください'); return; }

  const anime = ANIMES.find(a => a.id === animeId);
  const score = SCORES[type];

  // 週次データ更新
  const weekKey = getWeekKey();
  const weekData = loadData(weekKey);
  if (!weekData[animeId]) weekData[animeId] = { kami:0, yoin:0, fubin:0, total:0 };
  weekData[animeId][type]++;
  weekData[animeId].total += score;
  saveData(weekKey, weekData);

  // シーズン累計更新
  const seasonData = loadData(SEASON_KEY);
  if (!seasonData[animeId]) seasonData[animeId] = { kami:0, yoin:0, fubin:0, total:0 };
  seasonData[animeId][type]++;
  seasonData[animeId].total += score;
  saveData(SEASON_KEY, seasonData);

  showToast(`${anime.emoji} ${anime.title} に ${EMOTION_LABEL[type]} +${score}点！`);
  renderRanking();
}

// ============================================================
// 期間切り替え
// ============================================================
function switchPeriod(period) {
  currentPeriod = period;
  document.getElementById('btn-weekly').classList.toggle('active', period === 'weekly');
  document.getElementById('btn-season').classList.toggle('active', period === 'season');
  renderRanking();
}

// ============================================================
// ランキング描画
// ============================================================
function renderRanking() {
  const key = currentPeriod === 'weekly' ? getWeekKey() : SEASON_KEY;
  const data = loadData(key);

  // 週ラベル
  const weekLabel = document.getElementById('week-label');
  if (currentPeriod === 'weekly') {
    const now = new Date();
    const mon = new Date(now); mon.setDate(now.getDate() - now.getDay() + 1);
    const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
    const fmt = d => `${d.getMonth()+1}/${d.getDate()}`;
    weekLabel.textContent = `${fmt(mon)}（月）〜 ${fmt(sun)}（日）の集計`;
  } else {
    weekLabel.textContent = '2026年 春アニメ シーズン累計';
  }

  // スコア付きリスト生成
  const ranked = ANIMES.map(a => ({
    ...a,
    kami:  (data[a.id]?.kami  || 0),
    yoin:  (data[a.id]?.yoin  || 0),
    fubin: (data[a.id]?.fubin || 0),
    total: (data[a.id]?.total || 0),
  })).filter(a => a.total > 0).sort((a,b) => b.total - a.total);

  const podiumEl   = document.getElementById('podium');
  const rankListEl = document.getElementById('rank-list');

  if (ranked.length === 0) {
    podiumEl.innerHTML = '';
    rankListEl.innerHTML = `
      <div class="empty-state">
        <div class="icon">📭</div>
        <p>まだ感情ログがありません。<br>作品を選んで「神・余韻・不憫」を記録しよう。</p>
      </div>`;
    return;
  }

  const maxScore = ranked[0].total;

  // TOP3 表彰台
  const top3 = ranked.slice(0, 3);
  // 表示順：2位・1位・3位
  const podiumOrder = [top3[1], top3[0], top3[2]].filter(Boolean);
  podiumEl.innerHTML = podiumOrder.map((a, i) => {
    const rank = top3.indexOf(a) + 1;
    return `
      <div class="podium-item">
        <div class="podium-emoji">${a.emoji}</div>
        <div class="podium-title">${a.title}</div>
        <div class="podium-score">${a.total}<span style="font-size:12px;color:var(--muted2)">pt</span></div>
        <div class="podium-bar">
          <div class="podium-rank">${rank}</div>
        </div>
      </div>`;
  }).join('');


  // Xシェアボタン更新
  updateShareButton(ranked);

  // 4位以下
  const rest = ranked.slice(3);
  if (rest.length === 0) {
    rankListEl.innerHTML = '';
  } else {
    rankListEl.innerHTML = rest.map((a, i) => {
      const rank = i + 4;
      const pct = maxScore > 0 ? Math.round((a.total / maxScore) * 100) : 0;
      return `
        <div class="rank-item" style="animation-delay:${i*0.05}s">
          <div class="rank-num">${rank}</div>
          <div class="rank-emoji">${a.emoji}</div>
          <div class="rank-info">
            <div class="rank-title">${a.title}</div>
            <div class="rank-breakdown">
              <div class="rb-item"><span class="rb-count kami">${a.kami}</span><span style="color:var(--muted2)">×神</span></div>
              <div class="rb-item"><span class="rb-count yoin">${a.yoin}</span><span style="color:var(--muted2)">×余韻</span></div>
              <div class="rb-item"><span class="rb-count fubin">${a.fubin}</span><span style="color:var(--muted2)">×不憫</span></div>
            </div>
            <div class="score-bar-wrap">
              <div class="score-bar"><div class="score-bar-fill" style="width:${pct}%"></div></div>
            </div>
          </div>
          <div class="rank-score-wrap">
            <div class="rank-score">${a.total}</div>
            <div class="rank-score-label">pt</div>
          </div>
        </div>`;
    }).join('');
  }
}


// ============================================================
// Xシェアボタン生成
// ============================================================
function updateShareButton(ranked) {
  const btn = document.getElementById('x-share-btn');
  if (!ranked.length) {
    btn.style.display = 'none';
    return;
  }
  btn.style.display = 'flex';

  const medals = ['🥇','🥈','🥉'];
  const top3lines = ranked.slice(0,3).map((a,i) =>
    `${medals[i]} ${a.title} ${a.total}pt`
  ).join('\n');

  const period = currentPeriod === 'weekly' ? '今週' : 'シーズン';
  const totalKami  = ranked.reduce((s,a)=>s+a.kami,0);
  const totalYoin  = ranked.reduce((s,a)=>s+a.yoin,0);
  const totalFubin = ranked.reduce((s,a)=>s+a.fubin,0);

  const text = `📺 ${period}のAnimeSync感情ランキング\n\n${top3lines}\n\n✨神×${totalKami} 🌊余韻×${totalYoin} 💔不憫×${totalFubin}\n\n#AnimeSync #2026春アニメ`;

  btn.href = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`;
}

// ============================================================
// トースト
// ============================================================
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

// ============================================================
// 初期化
// ============================================================
initSelect();
renderRanking();
</script>
</body>
</html>
